log:
  # 日志等级
  level: 'INFO'

bot:
  # 代理配置（从环境变量读取，空值表示不使用代理）
  proxy: '${TG_PROXY:-}'

  # Telegram 机器人 Token
  token: '${TG_TOKEN}'
  
  # 鉴权用令牌。第一次进入机器人时用于校验身份
  auth_token: '${AUTH_TOKEN}'

  # 机器人会话文件路径（用于保存登录状态）
  session_file: '/app/bot.session'

transaction:
  # 账本文件。可以使用：{year}、{month}、{date}
  # 自动按年月分文件夹存储
  beancount_file: '/bean/{year}-{month}月/{month}月交易.bean'

  # 消息处理器
  message_dispatcher:
    # class 必须包含完整模块名，第三方插件可以设置 PYTHONPATH 载入
    # args 参考每个处理器各自的文档
    # 目前内建了模板处理器，配置如下即可
    - class: 'auto_format_dispatcher.AutoFormatDispatcher'
      args:
        template_config: '/config/template.yml'

  # 添加在交易上的标签（已改为由 auto_format_dispatcher 动态添加）
  tags: []

schedule:
  # 定时任务定义

  - name: price
    class: 'beancount_bot.builtin.DailyCommandTask'
    args:
      time: '${PRICE_TIME:-21:30}' 
      message: '价格更新完成'
      commands:
        - 'cd /config && python stock_price_cn.py'
        - 'export https_proxy=${PROXY_URL} && cd /config && python stock_price_usa.py'
        - 'cd /config && python stock_price_clean.py'
